<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo DJ Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
    <style>
        .page-switch-btn {
            display: inline-block;
            margin-bottom: 24px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            transition: background 0.2s;
        }
        .page-switch-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .view.active-view {
            display: flex; /* keep compatibility with our css */
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <button id="menu-close" class="menu-close">✕ Cerrar</button>
            <div class="sidebar-header">
                <h2>🎧 DJ Player</h2>
            </div>
            
            <a href="studio.html" class="page-switch-btn">🛠️ Editor Studio</a>

            <!-- Panel: Listas -->
            <div id="panel-playlists">
                <div class="section-title">
                    <h3>Listas</h3>
                </div>
                <ul id="playlist-list" class="sidebar-list">
                    <!-- Playlists will be injected here -->
                </ul>
            </div>

            <!-- Panel: Pistas -->
            <div id="panel-tracks" style="display:none;">
                <div class="section-title section-title--back" id="btn-back-to-playlists" tabindex="0">
                    <span class="back-arrow">‹</span>
                    <h3 id="panel-tracks-title">Pistas</h3>
                </div>
                <ul id="track-list" class="sidebar-list track-list">
                    <!-- Tracks of active playlist injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- DJ Mode View -->
            <section id="dj-mode-view" class="view active-view">
                <header class="view-header">
                    <h1 id="dj-playlist-title">Selecciona una Lista</h1>
                    <p id="dj-track-title">Listo para reproducir...</p>
                </header>

                <div class="player-wrapper glass-panel">
                    <div id="dj-player" class="yt-player"></div>
                </div>

                <div class="dj-controls glass-panel" style="position: relative;">
                    <button id="menu-toggle" class="control-btn" title="Menú" tabindex="0" style="position: absolute; left: 20px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </button>
                    <button id="btn-prev" class="control-btn" title="Anterior" tabindex="0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="btn-play-pause" class="control-btn play-btn" title="Reproducir / Pausa" tabindex="0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button id="btn-next" class="control-btn" title="Siguiente" tabindex="0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                    <button id="btn-fullscreen" class="control-btn" title="Pantalla Completa" tabindex="0" style="position: absolute; right: 20px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="data.js"></script>
    <script src="dj.js"></script>
    <script>
        document.getElementById('menu-toggle').addEventListener('click', () => {
            if (typeof openSidebar === 'function') openSidebar();
            else document.getElementById('sidebar').classList.add('open');
        });
        document.getElementById('menu-close').addEventListener('click', () => {
            if (typeof closeSidebar === 'function') closeSidebar();
            else document.getElementById('sidebar').classList.remove('open');
        });
    </script>
</body>
</html>
